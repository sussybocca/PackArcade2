<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LIVEPAGE • IMMERSIVE EDITOR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <!-- advanced immersive ui — netlify functions fully preserved -->
  <style>
    /* ---------- GLOBAL RESET / IMMERSIVE ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.2s ease, border 0.15s ease, box-shadow 0.25s, transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      background: radial-gradient(circle at 10% 30%, #0c0e12 0%, #050708 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: rgba(255, 255, 255, 0.94);
      padding: 2rem 1.5rem;
      max-width: 860px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px);
      line-height: 1.6;
    }

    /* custom glass-scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(20, 25, 36, 0.3);
      border-radius: 20px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(100, 140, 255, 0.4);
      border-radius: 20px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(79, 124, 255, 0.7);
    }

    /* typography */
    h2, h3 {
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    a {
      color: #b2c3ff;
      text-decoration: none;
      font-weight: 450;
      font-size: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 2px;
      transition: border 0.2s, color 0.2s;
    }

    a:hover {
      color: white;
      border-bottom-color: #4f7cff;
    }

    /* ---- IMMERSIVE TOP PANEL (GLASS) ---- */
    .top-panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      background: rgba(10, 15, 25, 0.6);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 42px;
      padding: 0.9rem 1.8rem;
      box-shadow: 0 18px 35px -12px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .page-title-glow {
      font-size: 1.85rem;
      font-weight: 650;
      background: linear-gradient(120deg, #fff, #d6e0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 5px rgba(0,20,100,0.4);
      margin-right: 1rem;
    }

    .view-badge {
      background: rgba(12, 20, 40, 0.7);
      backdrop-filter: blur(8px);
      padding: 0.4rem 1.1rem;
      border-radius: 34px;
      border: 0.5px solid rgba(79, 124, 255, 0.5);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .view-badge span {
      background: #4f7cff;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px #4f7cff;
    }

    /* ---------- CARD STYLE — DEEP SPACE ---------- */
    .card {
      background: rgba(18, 24, 34, 0.7);
      backdrop-filter: blur(12px) saturate(200%);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 32px;
      padding: 1.8rem 1.8rem;
      margin-bottom: 1.8rem;
      box-shadow: 0 25px 40px -20px #00000080, inset 0 1px 1px rgba(255,255,255,0.03);
    }

    /* immersive textarea — like a neural interface */
    .immersive-textarea {
      width: 100%;
      padding: 1.2rem 1.5rem;
      border-radius: 28px;
      border: 1.5px solid rgba(255, 255, 255, 0.04);
      background: rgba(6, 10, 18, 0.7);
      backdrop-filter: blur(12px);
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02);
      color: white;
      font-size: 1.05rem;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
      transition: all 0.25s;
      outline: none;
      font-weight: 380;
    }

    .immersive-textarea:focus {
      border-color: rgba(79, 124, 255, 0.6);
      background: rgba(8, 14, 26, 0.85);
      box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.1), inset 0 2px 8px black;
    }

    /* character count — floating hologram */
    .char-hologram {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-top: 0.7rem;
      margin-bottom: 0.6rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(190, 210, 255, 0.7);
    }

    .char-progress {
      background: rgba(79, 124, 255, 0.2);
      height: 6px;
      width: 100%;
      border-radius: 10px;
      display: block;
      margin-top: 6px;
      position: relative;
      backdrop-filter: blur(2px);
      border: 0.5px solid rgba(255,255,255,0.1);
    }

    .char-fill {
      height: 6px;
      background: linear-gradient(90deg, #6d8eff, #3f5fd1);
      border-radius: 10px;
      width: 0%;
      box-shadow: 0 0 12px #3f6aff;
      transition: width 0.2s ease-out;
    }

    /* buttons — cyber-lucid */
    .btn {
      background: rgba(25, 35, 55, 0.9);
      border: 0.8px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      padding: 0.85rem 1.9rem;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 520;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
      letter-spacing: 0.3px;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(145deg, #4f7cff, #3a5fcc);
      border: 0.5px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 20px rgba(79,124,255,0.25);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(145deg, #618aff, #456edb);
      box-shadow: 0 12px 28px rgba(79,124,255,0.45);
      transform: scale(1.02);
      border-color: rgba(255,255,255,0.3);
    }

    .btn:disabled {
      opacity: 0.3;
      filter: grayscale(0.6);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* page content editor — distinct but cohesive */
    .page-editor-area {
      margin-top: 0.5rem;
      position: relative;
    }

    .label-float {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #96abff;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label-float::before {
      content: "✦";
      font-size: 1rem;
    }

    /* posts feed — infinite, elegant */
    .posts-feed {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-top: 1rem;
    }

    .post-card {
      background: rgba(12, 18, 28, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 26px;
      padding: 1.6rem 1.8rem;
      transition: all 0.25s;
      box-shadow: 0 10px 20px -10px black;
    }

    .post-card:hover {
      background: rgba(18, 26, 40, 0.8);
      border-color: rgba(79, 124, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 22px 30px -14px #000000d0;
    }

    .post-content {
      font-size: 1.05rem;
      font-weight: 360;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.92);
      word-break: break-word;
    }

    .post-time {
      display: block;
      margin-top: 0.9rem;
      font-size: 0.7rem;
      color: rgba(160, 180, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 2px;
      border-top: 0.5px solid rgba(255,255,255,0.05);
      padding-top: 0.8rem;
    }

    /* empty state */
    .empty-state {
      background: rgba(0,0,0,0.2);
      border-radius: 28px;
      padding: 2.6rem;
      text-align: center;
      border: 1px dashed rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
      color: rgba(200,215,255,0.5);
      font-style: italic;
    }

    /* extra micro-interactions */
    .success-check {
      transition: opacity 0.3s;
    }

    .footer-note {
      margin-top: 3.5rem;
      text-align: center;
      font-size: 0.7rem;
      opacity: 0.4;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<!-- IMMERSIVE HEADER — DYNAMIC TITLE + VIEW LINK (glass) -->
<div class="top-panel">
  <h2 class="page-title-glow" id="pageTitle">⟳ LOADING</h2>
  <div class="view-badge">
    <span></span>
    <a id="viewLink" target="_blank" style="border-bottom: none;">VIEW LIVE PAGE →</a>
  </div>
</div>

<!-- ========== CARD: CREATE POST (IMMERSIVE) ========== -->
<div class="card" style="padding-bottom: 1.6rem;">
  <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
    <span style="background: #4f7cff20; padding: 8px 16px; border-radius: 36px; font-size: 0.8rem; border: 0.5px solid #4f7cff40; backdrop-filter: blur(4px);">
      ⚡ LIVE FEED CONTRIBUTION
    </span>
  </div>
  
  <!-- main post textarea -->
  <textarea id="postText" maxlength="500" placeholder="Type your thought… (immerse yourself)" class="immersive-textarea" style="min-height: 130px;"></textarea>
  
  <!-- advanced char counter with progress fill -->
  <div class="char-hologram">
    <span style="display: flex; gap: 4px; align-items: baseline;">
      <span id="count">0</span> <span style="opacity: 0.6;">/ 500</span>
    </span>
    <span style="display: flex; gap: 4px;">
      <span style="opacity: 0.5;">LUMEN</span>
    </span>
  </div>
  <div class="char-progress">
    <div id="charFill" class="char-fill" style="width: 0%;"></div>
  </div>
  
  <!-- SAVE POST BUTTON — primary -->
  <button id="saveBtn" onclick="savePost()" disabled class="btn btn-primary" style="margin-top: 1.5rem; width: 100%;">
    <span>✧</span> SAVE POST <span>✧</span>
  </button>
</div>

<!-- ========== PAGE CONTENT EDITOR — advanced, same netlify function ========== -->
<div class="card page-editor-area">
  <div class="label-float">
    PAGE METADATA / CONTENT EDITOR
  </div>
  <textarea id="pageContentBox" placeholder="Edit page content (meta, description, anything)…" class="immersive-textarea" style="height: 150px; background: rgba(8, 14, 26, 0.7);">Loading…</textarea>
  <button id="savePageBtn" class="btn" style="margin-top: 1.3rem; background: rgba(30, 45, 80, 0.9); border: 0.5px solid #5f7fd0;">
    <span>⟳</span> SAVE PAGE CHANGES <span>⟳</span>
  </button>
</div>

<!-- ========== POSTS STREAM — DYNAMIC FEED ========== -->
<div style="display: flex; justify-content: space-between; align-items: baseline; margin-top: 0.5rem; margin-bottom: 0.6rem;">
  <h3 style="font-weight: 470; letter-spacing: -0.01em; background: linear-gradient(145deg, #ccd9ff, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">⸻  IMMERSIVE STREAM ⸻</h3>
  <span style="font-size: 0.7rem; padding: 6px 14px; background: rgba(0,0,0,0.3); border-radius: 40px; backdrop-filter: blur(4px);">✨ realtime</span>
</div>

<!-- POSTS CONTAINER -->
<div id="posts" class="posts-feed"></div>

<!-- subtle footer — netlify functions untouched -->
<div class="footer-note">
  ⚡ FUNCTIONS: getPage · updatePage · getPosts · savePost — PRESERVED
</div>

<script>
  // ==========================================================================
  //  IMMERSIVE UI — ADVANCED, SAME NETLIFY FUNCTIONS (PRESERVED)
  //  all fetch endpoints remain / functions exactly as required
  //  slug, getPage, updatePage, getPosts, savePost — fully intact
  // ==========================================================================

  const params = new URLSearchParams(window.location.search);
  const slug = params.get("slug");

  // ----- DOM refs (advanced) -----
  const textarea = document.getElementById("postText");
  const countEl = document.getElementById("count");
  const charFill = document.getElementById("charFill");
  const btnSavePost = document.getElementById("saveBtn");
  const postsDiv = document.getElementById("posts");
  const pageTitle = document.getElementById("pageTitle");
  const viewLink = document.getElementById("viewLink");
  
  // Page content editor (replaces old pageContentBox) — we keep same variable naming, but we already have textarea ID
  const pageContentBox = document.getElementById("pageContentBox");
  const savePageBtn = document.getElementById("savePageBtn");

  // ---------- POST TEXTAREA LIVE COUNT & PROGRESS ----------
  function updateCharUI() {
    const len = textarea.value.length;
    countEl.textContent = len;
    const percent = Math.min((len / 500) * 100, 100);
    if (charFill) charFill.style.width = percent + '%';
    btnSavePost.disabled = len === 0 || textarea.value.trim().length === 0;
  }

  textarea.addEventListener("input", updateCharUI);
  // initialize
  window.addEventListener('DOMContentLoaded', () => {
    updateCharUI();
  });

  // ---------- LOAD PAGE (IMMERSIVE) ----------
  async function loadPage() {
    if (!slug) {
      pageTitle.textContent = '✗ NO SLUG';
      return alert("No page slug provided!");
    }

    try {
      const pageRes = await fetch(`/.netlify/functions/getPage?slug=${slug}`);
      if (!pageRes.ok) throw new Error('load page fail');
      const html = await pageRes.text();

      const doc = new DOMParser().parseFromString(html, "text/html");
      const titleEl = doc.querySelector("h1");
      const metaEl = doc.querySelector(".meta");

      if (!titleEl) {
        alert("Page structure: missing h1.");
        return;
      }

      pageTitle.textContent = titleEl.textContent || 'untitled page';
      // set page content editor value (meta)
      pageContentBox.value = metaEl ? metaEl.textContent.trim() : '';
      // set view link
      viewLink.href = `/l/${slug}`;
      
      // load posts after page metadata
      await loadPosts();
    } catch (e) {
      console.error(e);
      alert("Failed to load page.");
    }
  }

  // ---------- LOAD POSTS (getPosts) ----------
  async function loadPosts() {
    if (!slug) return;
    try {
      const res = await fetch(`/.netlify/functions/getPosts?slug=${slug}`);
      if (!res.ok) throw new Error('posts fetch fail');
      
      const posts = await res.json();
      postsDiv.innerHTML = '';

      if (!posts || posts.length === 0) {
        postsDiv.innerHTML = '<div class="empty-state">⚡ no posts yet — be the first signal ⚡</div>';
        return;
      }

      posts.forEach(p => {
        const div = document.createElement("div");
        div.className = "post-card";
        // content & date with immersive micro-format
        const dateStr = p.created_at ? new Date(p.created_at).toLocaleString(undefined, {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        }) : 'just now';
        div.innerHTML = `
          <div class="post-content">${escapeHTML(p.content) || '…'}</div>
          <div class="post-time">✧ ${dateStr}</div>
        `;
        postsDiv.appendChild(div);
      });
    } catch (e) {
      console.warn(e);
      postsDiv.innerHTML = '<div class="empty-state">⚠️ failed to load stream</div>';
    }
  }

  // tiny escape (XSS guard)
  function escapeHTML(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"]/g, function(c) {
      if(c === '&') return '&amp;';
      if(c === '<') return '&lt;';
      if(c === '>') return '&gt;';
      if(c === '"') return '&quot;';
      return c;
    });
  }

  // ---------- SAVE POST (savePost) — netlify function ----------
  window.savePost = async function savePost() {
    const content = textarea.value.trim();
    if (!content) return;

    btnSavePost.disabled = true;
    btnSavePost.innerHTML = `<span>🌀</span> PUBLISHING... <span>🌀</span>`;

    try {
      const res = await fetch("/.netlify/functions/savePost", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slug, content })
      });

      if (!res.ok) throw new Error('save failed');

      // success: reset
      textarea.value = '';
      updateCharUI(); // reset count + progress bar
      btnSavePost.innerHTML = `<span>✧</span> SAVE POST <span>✧</span>`;
      btnSavePost.disabled = true;  // empty field -> disabled
      
      await loadPosts();  // refresh feed
    } catch (err) {
      alert("Failed to save post.");
      btnSavePost.disabled = false;
      btnSavePost.innerHTML = `<span>✧</span> SAVE POST <span>✧</span>`;
    }
  };

  // ---------- SAVE PAGE (updatePage) — netlify function preserved ----------
  window.savePage = async function savePage() {
    savePageBtn.textContent = "SAVING PAGE…";
    savePageBtn.disabled = true;

    try {
      const res = await fetch("/.netlify/functions/updatePage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          slug,
          title: pageTitle.textContent,    // title from h1 glow element
          content: pageContentBox.value
        })
      });

      if (!res.ok) throw new Error('update fail');

      savePageBtn.textContent = "✓ SAVED ✓";
      savePageBtn.style.background = "rgba(40, 70, 150, 0.9)";
      setTimeout(() => {
        savePageBtn.textContent = "⟳ SAVE PAGE CHANGES ⟳";
        savePageBtn.style.background = ""; // revert
        savePageBtn.disabled = false;
      }, 1600);
    } catch (e) {
      alert("Failed to update page.");
      savePageBtn.textContent = "⟳ SAVE PAGE CHANGES ⟳";
      savePageBtn.disabled = false;
    }
  };

  // bind save page button
  savePageBtn.onclick = savePage;

  // Additional: re-trigger count on manual clear etc.
  // call loadPage at start
  loadPage();

  // Optionally, listen for posts refresh via pull to feel — no removal of functions
  // all fetch calls remain pointing to .netlify/functions/...
  // Fully immersive, futuristic UI, same backend

  // little extra: to ensure we reflect 0/500 at start
  window.onload = function() {
    updateCharUI();
  };
</script>

<!-- preserve all netlify function endpoints — absolutely unchanged -->
<!-- getPage, updatePage, getPosts, savePost remain as originally intended -->
</body>
</html>

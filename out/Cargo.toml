[package]
name = "jova-compiler"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# WASM bindings
wasm-bindgen = "0.2.92"

# Serialization for passing data between Rust and JS
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging (works in WASM)
log = "0.4"
console_log = "1.0"

# Optional: For better string handling
regex = "1.10"

# Optional: For CLI when not compiling to WASM
clap = { version = "4.5", optional = true }

# Web-specific dependencies (only when targeting WASM)
[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console", "Window", "Document"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1

[features]
default = []
cli = ["clap"]